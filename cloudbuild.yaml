# Cloud Build pipeline for DoppelSpotter app
#
# Trigger: push to main branch, included files filter: app/**
# This ensures landing-page/, docs/, AGENTS.md changes do NOT trigger a build.
#
# Required substitution variables (set in Cloud Build trigger):
#   _REGION    — e.g. europe-west2
#   _REPO      — Artifact Registry repo name, e.g. doppelspotter
#   _SERVICE   — Cloud Run service name, e.g. doppelspotter-app
#
# All runtime environment variables (GCP_PROJECT_ID, AUTH_JWT_SECRET, etc.)
# are managed directly on the Cloud Run service via the Cloud Console —
# not via Secret Manager or build-time injection.

steps:
  # 1. Build the Docker image from app/Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - 'build'
      - '--tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA'
      - '--tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest'
      - '--file=app/Dockerfile'
      - 'app'

  # 2. Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    waitFor: ['push']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=8080'
      - '--timeout=600'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest'

substitutions:
  _SERVICE: doppelspotter-app
  _REGION: europe-west2
  _REPO: doppelspotter

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
